services:
  - type: web
    name: kinetik-api
    runtime: node
    plan: free
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @kinetik/database generate && pnpm turbo run build --filter=@kinetik/api...
    startCommand: pnpm --filter @kinetik/api start
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_VERSION
        value: 20.18.0

  - type: web
    name: kinetik-web
    runtime: node
    plan: free
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm turbo run build --filter=@kinetik/web...
    startCommand: pnpm --filter @kinetik/web start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NODE_VERSION
        value: 20.18.0
